# Scaffold manifest — lists all standard files that the update mechanism tracks.
# Each entry:
#   path: file path relative to project root
#   rendered: whether file contains {{cookiecutter.*}} placeholders
#   layer: which layer owns this file (always | web:* | api:* | mobile:*)
#   description: human-readable purpose

# --- Core config ---
- path: .pre-commit-config.yaml
  rendered: false
  layer: always
  description: Pre-commit hook configuration

- path: .editorconfig
  rendered: false
  layer: always
  description: Editor config for consistent formatting

- path: .gitignore
  rendered: false
  layer: always
  description: Git ignore rules

- path: .env.example
  rendered: false
  layer: always
  description: Environment variable template

