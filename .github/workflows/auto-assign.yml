name: Auto-assign reviewers

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  assign:
    name: Assign from CODEOWNERS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;

            const codeownersPath = '.github/CODEOWNERS';
            if (!fs.existsSync(codeownersPath)) {
              console.log('No CODEOWNERS file found. Skipping auto-assign.');
              return;
            }

            const { data: diff } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const changedFiles = diff.map(f => f.filename);
            const owners = parseCodeowners(codeownersPath, changedFiles);

            if (owners.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: owners,
              });
              console.log(`Assigned reviewers: ${owners.join(', ')}`);
            }

            function parseCodeowners(path, files) {
              const content = fs.readFileSync(path, 'utf-8');
              const rules = [];

              for (const line of content.split('\n')) {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith('#')) continue;

                const parts = trimmed.split(/\s+/);
                const pattern = parts[0];
                const owners = parts.slice(1)
                  .filter(o => o.startsWith('@'))
                  .map(o => o.replace('@', ''));

                if (owners.length === 0) continue;
                rules.push({ pattern, owners });
              }

              const matched = new Set();
              for (const rule of rules) {
                for (const file of files) {
                  const regex = globToRegex(rule.pattern);
                  if (regex.test(file)) {
                    rule.owners.forEach(o => matched.add(o));
                  }
                }
              }

              return [...matched];
            }

            function globToRegex(pattern) {
              const escaped = pattern.replace(/[.+^${}()|\[\]\\]/g, '\\$&');
              const regexStr = escaped
                .replace(/\*\*/g, '.*')
                .replace(/\*/g, '[^/]*')
                .replace(/\?/g, '.');
              return new RegExp(`^${regexStr}$`);
            }
