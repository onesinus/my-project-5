name: Review reminder

on:
  schedule:
    - cron: '0 */4 * * 1-5'
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write

jobs:
  remind:
    name: Remind stale reviewers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const SLA_HOURS = 4;
            const now = new Date();

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              sort: 'created',
              direction: 'asc',
            });

            for (const pr of prs) {
              if (pr.draft) continue;

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              const hasHumanReview = reviews.some(
                r => r.state === 'APPROVED' || r.state === 'CHANGES_REQUESTED'
              );
              if (hasHumanReview) continue;

              const { data: requestedReviewers } = await github.rest.pulls.listRequestedReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              if (requestedReviewers.users.length === 0) continue;

              const created = new Date(pr.created_at);
              const hoursWaiting = (now - created) / (1000 * 60 * 60);
              if (hoursWaiting < SLA_HOURS) continue;

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
              });

              const alreadyNudged = comments.some(
                c => c.user.type === 'Bot' && c.body.includes('SLA')
              );
              if (alreadyNudged) continue;

              const reviewerMentions = requestedReviewers.users
                .map(u => `@${u.login}`)
                .join(' ');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `⏰ Review SLA reminder — this PR has been waiting for **${Math.round(hoursWaiting)} hours** (SLA: ${SLA_HOURS}h).\n\nReviewers: ${reviewerMentions}\n\nPlease review or reassign within the next hour.`,
              });
            }
